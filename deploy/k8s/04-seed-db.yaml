apiVersion: batch/v1
kind: Job
metadata:
  name: seed-conciliation-db
  namespace: temporal-poc
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: seed
        image: postgres:16-alpine
        env:
        - name: PGHOST
          value: postgres-rw
        - name: PGUSER
          value: temporal
        - name: PGPASSWORD
          value: temporal123
        - name: PGDATABASE
          value: conciliation
        command:
        - sh
        - -c
        - |
          echo "Waiting for postgres..."
          until pg_isready -h postgres-rw -p 5432 -U temporal; do sleep 2; done
          echo "Running schema + seed..."
          psql -f /scripts/schema.sql
          echo "Verifying..."
          psql -c "
            SELECT p.code, p.tier,
              COUNT(DISTINCT m.id) AS merchants,
              COUNT(DISTINCT l.id) AS active_loans,
              COUNT(t.id) AS pending_txns
            FROM partners p
            JOIN merchants m ON m.partner_id = p.id
            LEFT JOIN loans l ON l.merchant_id = m.id AND l.status = 'active'
            LEFT JOIN transactions t ON t.merchant_id = m.id AND t.status = 'pending'
            GROUP BY p.id, p.code, p.tier
            ORDER BY p.id;
          "
        volumeMounts:
        - name: schema
          mountPath: /scripts
      volumes:
      - name: schema
        configMap:
          name: schema-sql
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: schema-sql
  namespace: temporal-poc
data:
  schema.sql: |
    CREATE TABLE IF NOT EXISTS partners (
        id          SERIAL PRIMARY KEY,
        name        VARCHAR(100) NOT NULL,
        code        VARCHAR(50) UNIQUE NOT NULL,
        tier        VARCHAR(20) NOT NULL,
        created_at  TIMESTAMP DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS merchants (
        id          SERIAL PRIMARY KEY,
        partner_id  INT NOT NULL REFERENCES partners(id),
        name        VARCHAR(100) NOT NULL,
        external_id VARCHAR(50) UNIQUE NOT NULL,
        created_at  TIMESTAMP DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS loans (
        id              SERIAL PRIMARY KEY,
        merchant_id     INT NOT NULL REFERENCES merchants(id),
        original_amount NUMERIC(12,2) NOT NULL,
        remaining_amount NUMERIC(12,2) NOT NULL,
        status          VARCHAR(20) NOT NULL DEFAULT 'active',
        created_at      TIMESTAMP DEFAULT NOW(),
        paid_at         TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS transactions (
        id          SERIAL PRIMARY KEY,
        merchant_id INT NOT NULL REFERENCES merchants(id),
        amount      NUMERIC(12,2) NOT NULL,
        status      VARCHAR(20) NOT NULL DEFAULT 'pending',
        created_at  TIMESTAMP DEFAULT NOW(),
        processed_at TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS collections (
        id              SERIAL PRIMARY KEY,
        loan_id         INT NOT NULL REFERENCES loans(id),
        transaction_id  INT NOT NULL REFERENCES transactions(id),
        amount          NUMERIC(12,2) NOT NULL,
        created_at      TIMESTAMP DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_merchants_partner ON merchants(partner_id);
    CREATE INDEX IF NOT EXISTS idx_loans_merchant ON loans(merchant_id);
    CREATE INDEX IF NOT EXISTS idx_transactions_merchant_status ON transactions(merchant_id, status);
    CREATE INDEX IF NOT EXISTS idx_collections_loan ON collections(loan_id);
    CREATE INDEX IF NOT EXISTS idx_collections_transaction ON collections(transaction_id);

    INSERT INTO partners (name, code, tier) VALUES
        ('Partner Alpha',   'partner-alpha',   'light'),
        ('Partner Beta',    'partner-beta',    'light'),
        ('Partner Gamma',   'partner-gamma',   'medium'),
        ('Partner Delta',   'partner-delta',   'heavy'),
        ('Partner Epsilon', 'partner-epsilon', 'extra-heavy')
    ON CONFLICT (code) DO NOTHING;

    CREATE OR REPLACE FUNCTION seed_partner_data(
        p_partner_id INT,
        p_merchant_count INT,
        p_txn_per_merchant INT,
        p_loan_pct NUMERIC
    ) RETURNS VOID AS $$
    DECLARE
        m_id INT;
        m_idx INT;
        t_idx INT;
        txn_amount NUMERIC;
        has_loan BOOLEAN;
    BEGIN
        -- Skip if partner already has merchants
        IF EXISTS (SELECT 1 FROM merchants WHERE partner_id = p_partner_id LIMIT 1) THEN
            RAISE NOTICE 'Partner % already seeded, skipping', p_partner_id;
            RETURN;
        END IF;

        FOR m_idx IN 1..p_merchant_count LOOP
            INSERT INTO merchants (partner_id, name, external_id)
            VALUES (
                p_partner_id,
                'Merchant ' || p_partner_id || '-' || m_idx,
                'MRC-' || p_partner_id || '-' || LPAD(m_idx::TEXT, 6, '0')
            )
            RETURNING id INTO m_id;

            has_loan := (random() * 100) < p_loan_pct;

            IF has_loan THEN
                INSERT INTO loans (merchant_id, original_amount, remaining_amount, status)
                VALUES (
                    m_id,
                    ROUND((random() * 49500 + 500)::NUMERIC, 2),
                    0,
                    'active'
                );
                UPDATE loans SET remaining_amount = original_amount
                WHERE merchant_id = m_id;
            END IF;

            FOR t_idx IN 1..p_txn_per_merchant LOOP
                txn_amount := ROUND((random() * 990 + 10)::NUMERIC, 2);
                INSERT INTO transactions (merchant_id, amount, status, created_at)
                VALUES (
                    m_id,
                    txn_amount,
                    'pending',
                    NOW() - (random() * INTERVAL '30 days')
                );
            END LOOP;
        END LOOP;
    END;
    $$ LANGUAGE plpgsql;

    SELECT seed_partner_data(1, 5, 40, 60);
    SELECT seed_partner_data(2, 10, 80, 70);
    SELECT seed_partner_data(3, 50, 500, 75);
    SELECT seed_partner_data(4, 200, 1000, 80);
    SELECT seed_partner_data(5, 500, 3000, 85);

    DROP FUNCTION IF EXISTS seed_partner_data;
